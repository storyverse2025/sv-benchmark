hting_direction", "lighting_intensity", "color_saturation", "color_palette", "camera_angle", "camera_movement", "composition", "time_mode", "shot_size", "depth_of_field", "focal_length", "time_of_day", "weather", "transition"], "core_intent": "A sad cartoon micro-story told across ruins, kitchen, and living room, showing a human, a fictional creature, and an insect in dialogue, with bird's-eye views, freeze-frame beats, and clear multi-shot scene progression.", "duration_seconds": 12}, "S5-11-vintage-film-desert-kitchen-living-room-human-mammal-light-effect-jumping": {"testcase_id": "S5-11-vintage-film-desert-kitchen-living-room-human-mammal-light-effect-jumping", "final_video_prompt": "Create a 12-second multi-shot vintage film sci-fi sequence at night in rainy weather. Show a human and a dog, both solid opaque normal-scale subjects, moving through three scenes: a desert, a kitchen, and a living room. Keep the action visually clear: the human and the dog both jump, with moderate joy. Use a diagonal spatial layout and rule-of-thirds composition. Shot 1: a low-angle static extreme long shot in a rainy desert at night, with timelapse rain and clouds, showing a glowing light-effect portal in front of the human in fabric clothing and the dog. Warm front light from the portal creates a high-key look despite the night setting. Low saturation, complementary blue-orange palette. Dissolve. Shot 2: a low-angle medium shot in a kitchen, slow push in, pan-focus, with the human landing and jumping again while the dog crosses frame; rain races down the window in timelapse and the portal lights the room. Warm front light, high-key exposure, low saturation, complementary teal-orange palette, vintage film grain. Dissolve. Shot 3: begin with a low-angle extreme close-up using macro lens detail on the dog's fabric collar and wet fur as it jumps, then whip pan to reveal the human finishing a joyful jump in a living room beside the glowing portal. Keep pan-focus where feasible, warm front light, high-key interior night lighting, low saturation, complementary amber-blue palette, visible vintage film texture. Make the sci-fi portal the motivated light source throughout.", "active_dimensions": ["style", "scenes", "subjects", "physical_state", "physical_rule", "texture", "opacity", "scale", "spatial_layout", "action", "emotion", "effect", "lighting_tone", "lighting_direction", "lighting_intensity", "color_saturation", "color_palette", "camera_angle", "camera_movement", "composition", "time_mode", "shot_size", "depth_of_field", "focal_length", "time_of_day", "weather", "transition"], "core_intent": "A vintage-film sci-fi micro-story where a joyful human and a mammal appear across a rainy desert, kitchen, and living room at night, with visible jumping action, low-angle framing, and clear multi-shot camera movement.", "duration_seconds": 12}}};

document.getElementById('s-exact').textContent = (DATA.summary.models.seedance.global_exact_match_rate * 100).toFixed(1) + '%';
document.getElementById('k-exact').textContent = (DATA.summary.models.kling.global_exact_match_rate * 100).toFixed(1) + '%';
document.getElementById('s-f1').textContent = DATA.summary.models.seedance.mean_macro_f1.toFixed(3);
document.getElementById('s-f1-sub').textContent = 'Seedance micro F1: ' + DATA.summary.models.seedance.mean_micro_f1.toFixed(3);
document.getElementById('k-f1').textContent = DATA.summary.models.kling.mean_macro_f1.toFixed(3);
document.getElementById('k-f1-sub').textContent = 'Kling micro F1: ' + DATA.summary.models.kling.mean_micro_f1.toFixed(3);

const container = document.getElementById('testcases-container');
const reportS = {};
const reportK = {};
DATA.report_seedance.reports.forEach(r => reportS[r.testcase_id] = r);
DATA.report_kling.reports.forEach(r => reportK[r.testcase_id] = r);

const statusSymbol = { exact: '✓', partial: '~', miss: '✗', unpredictable: '?', missing: '·', skipped: '–' };
const statusClass = { exact: 'status-exact', partial: 'status-partial', miss: 'status-miss', unpredictable: 'status-unpredictable', missing: 'status-miss', skipped: 'status-skipped' };

DATA.ground_truth.forEach(gt => {
  const tid = gt.testcase_id;
  const tc = DATA.testcases[tid];
  if (!tc) return;
  const diff = gt.difficulty;
  const rS = reportS[tid];
  const rK = reportK[tid];

  const tags = (tc.active_dimensions || []).map(d => {
    const m = gt.metrics.find(x => x.en_field === d);
    const vals = m && m.gt_values.length ? m.gt_values.join(', ') : '—';
    return `<span class="tag"><span class="dim">${d}:</span> ${vals}</span>`;
  }).join('');

  let metricsRows = '';
  gt.metrics.forEach((m, i) => {
    const sMetric = rS ? rS.metrics.find(x => x.en_field === m.en_field) : null;
    const kMetric = rK ? rK.metrics.find(x => x.en_field === m.en_field) : null;
    const gtVals = m.gt_values.length ? m.gt_values.join(', ') : '—';

    const sSt = sMetric ? sMetric.status : '—';
    const sPred = sMetric && sMetric.pred ? sMetric.pred.join(', ') : '—';
    const kSt = kMetric ? kMetric.status : '—';
    const kPred = kMetric && kMetric.pred ? kMetric.pred.join(', ') : '—';

    metricsRows += `<tr>
      <td>${i+1}</td>
      <td>${m.en_field}</td>
      <td class="val-list">${gtVals}</td>
      <td class="${statusClass[sSt] || ''}">${statusSymbol[sSt] || '—'}</td>
      <td class="val-list">${sPred}</td>
      <td class="${statusClass[kSt] || ''}">${statusSymbol[kSt] || '—'}</td>
      <td class="val-list">${kPred}</td>
    </tr>`;
  });

  const sExact = rS ? (rS.aggregate.exact_match_rate * 100).toFixed(1) + '%' : 'N/A';
  const kExact = rK ? (rK.aggregate.exact_match_rate * 100).toFixed(1) + '%' : 'N/A';
  const sF1 = rS ? rS.aggregate.macro_f1.toFixed(3) : 'N/A';
  const kF1 = rK ? rK.aggregate.macro_f1.toFixed(3) : 'N/A';

  const card = document.createElement('div');
  card.className = 'testcase-card';
  card.innerHTML = `
    <div class="tc-header" onclick="this.nextElementSibling.classList.toggle('open'); this.querySelector('.expand-icon').classList.toggle('open')">
      <div>
        <span class="expand-icon">&#9654;</span>
        <span class="tc-id">${tid}</span>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <span style="font-size:12px"><span class="seedance-color">${sExact}</span> / <span class="kling-color">${kExact}</span></span>
        <span class="tc-difficulty ${diff}">${diff}</span>
      </div>
    </div>
    <div class="tc-body">
      <h3>Prompt Tags (Ground Truth)</h3>
      <div class="tags-row">${tags}</div>

      <h3>Final Video Prompt</h3>
      <div class="prompt-box">${tc.final_video_prompt}</div>

      <h3>Generated Videos</h3>
      <div class="videos-row">
        <div class="video-box">
          <div class="video-label seedance-color">Seedance 2.0</div>
          <video controls preload="metadata" src="videos/${tid}_seedance.mp4"></video>
        </div>
        <div class="video-box">
          <div class="video-label kling-color">Kling v3</div>
          <video controls preload="metadata" src="videos/${tid}_kling.mp4"></video>
        </div>
      </div>

      <h3>Scores</h3>
      <div class="score-row">
        <div class="score-box">
          <div class="model-name seedance-color">Seedance 2.0</div>
          <div class="score-val seedance-color">${sExact} exact</div>
          <div class="score-detail">Macro F1: ${sF1} &middot; ${rS ? rS.counts.exact + '/' + rS.counts.scorable + ' exact' : ''}</div>
        </div>
        <div class="score-box">
          <div class="model-name kling-color">Kling v3</div>
          <div class="score-val kling-color">${kExact} exact</div>
          <div class="score-detail">Macro F1: ${kF1} &middot; ${rK ? rK.counts.exact + '/' + rK.counts.scorable + ' exact' : ''}</div>
        </div>
      </div>

      <h3>Per-Metric Comparison</h3>
      <table class="metrics-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Metric</th>
            <th>Ground Truth</th>
            <th colspan="2">Seedance</th>
            <th colspan="2">Kling</th>
          </tr>
        </thead>
        <tbody>${metricsRows}</tbody>
      </table>
    </div>
  `;
  container.appendChild(card);
});
</script>
</body>
</html>
